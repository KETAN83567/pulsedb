# Project-local dbt profile. Run dbt from this folder with `--profiles-dir .`
# (or set DBT_PROFILES_DIR=transform). Keeps the connection reproducible and in-repo.
# No secrets here — DuckDB is a local file, so this is safe to commit.
pulsedb:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "../pulsedb.duckdb" # warehouse lives at the project root
      threads: 4
      schema: main

# Used by the `edr` CLI to render the Elementary observability HTML report.
# edr runs its internal dbt from a different cwd, so a relative path breaks;
# point PULSEDB_DUCKDB at the absolute warehouse path when running edr.
# Generated via: dbt run-operation elementary.generate_elementary_cli_profile
elementary:
  target: default
  outputs:
    default:
      type: duckdb
      path: "{{ env_var('PULSEDB_DUCKDB', '../pulsedb.duckdb') }}"
      schema: main_elementary
      threads: 4
