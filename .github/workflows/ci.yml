name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install dbt packages
        working-directory: transform
        run: uv run dbt deps

      - name: Ingest capped GH Archive sample
        env:
          GH_MAX_EVENTS: "2000" # fast + free: a slice, not the full hour
        run: uv run python ingestion/gh_archive_pipeline.py 2024-01-15-15

      - name: Create Elementary observability tables
        working-directory: transform
        run: uv run dbt run --select elementary --profiles-dir .

      - name: Build models + run all tests
        working-directory: transform
        run: uv run dbt build --profiles-dir .

      - name: Source freshness
        working-directory: transform
        run: uv run dbt source freshness --profiles-dir .
